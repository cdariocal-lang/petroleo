<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precio del barril de petróleo por país</title>
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #232323;
    --border: #3a3a3a;
    --text-primary: #f2f2f2;
    --text-secondary: #a8a8a8;
    --accent: #d81e1e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    padding: 2rem 1rem 3rem;
  }
  .wrap { max-width: 1040px; margin: 0 auto; }
  header { margin-bottom: 1.5rem; text-align: center; }
  h1 { font-size: 1.6rem; margin: 0 0 0.35rem; letter-spacing: -0.01em; }
  header p { margin: 0; color: var(--text-secondary); font-size: 0.95rem; }
  #map-container {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }
  #map { width: 100%; display: block; }
  path.country { stroke: var(--bg); stroke-width: 0.5; transition: filter 0.15s ease, stroke-width 0.15s ease; }
  path.country.has-data { cursor: pointer; }
  path.country.has-data:hover { filter: brightness(1.2); }
  path.country.selected { stroke: #ffffff; stroke-width: 1.6; }
  #info-panel {
    position: absolute;
    display: none;
    background: #0f0f0f;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    min-width: 170px;
    z-index: 10;
  }
  #info-panel .name { font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
  #info-panel .price { font-size: 1.15rem; font-weight: 700; color: var(--accent); }
  #info-panel .sub { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }
  #legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 18px;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.85rem; color: var(--text-secondary); }
  .legend-swatch { width: 15px; height: 15px; border-radius: 4px; display: inline-block; }
  footer { text-align: center; color: var(--text-secondary); font-size: 0.78rem; margin-top: 1.25rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Precio del barril de petróleo por país de origen</h1>
    <p>Haz clic en un país coloreado para ver el precio del barril</p>
  </header>

  <div id="map-container">
    <svg id="map" viewBox="0 0 960 500"></svg>
    <div id="info-panel">
      <div class="name" id="info-name"></div>
      <div class="price" id="info-price"></div>
      <div class="sub" id="info-freight"></div>
    </div>
  </div>

  <div id="legend"></div>
  <footer>Fuente: datos proporcionados por el usuario · Rango de referencia $50–$80 por barril</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const data = {
  "United States of America": { price: 68.45, freight: 4.00 },
  "Russia": { price: 64.12, freight: 8.90 },
  "Saudi Arabia": { price: 74.80, freight: 8.20 },
  "Canada": { price: 55.30, freight: 5.10 },
  "Venezuela": { price: 61.90, freight: 4.20 },
  "Iraq": { price: 69.50, freight: 8.10 },
  "China": { price: 71.32, freight: 7.80 },
  "United Arab Emirates": { price: 72.85, freight: 8.15 },
  "Kuwait": { price: 71.10, freight: 8.30 },
  "Iran": { price: 65.40, freight: 8.40 },
  "Brazil": { price: 70.25, freight: 4.75 },
  "Ecuador": { price: 66.10, freight: 2.15 },
  "Mexico": { price: 62.15, freight: 3.80 },
  "Angola": { price: 71.90, freight: 7.20 },
  "Algeria": { price: 72.65, freight: 6.90 },
  "Libya": { price: 71.80, freight: 7.10 },
  "Oman": { price: 72.40, freight: 8.05 },
  "United Kingdom": { price: 71.32, freight: 6.80 },
  "Kazakhstan": { price: 69.80, freight: 8.50 },
  "Norway": { price: 71.55, freight: 6.95 },
  "Qatar": { price: 71.95, freight: 8.25 },
  "Colombia": { price: 64.80, freight: 3.10 },
  "Azerbaijan": { price: 72.90, freight: 8.60 },
  "Malaysia": { price: 75.20, freight: 7.40 },
  "Gabon": { price: 70.45, freight: 7.15 }
};

const bins = [
  { min: 50, max: 55, color: '#FFE1D6', label: '$50 - $55' },
  { min: 55, max: 60, color: '#FFA07A', label: '$55 - $60' },
  { min: 60, max: 65, color: '#FF5A36', label: '$60 - $65' },
  { min: 65, max: 70, color: '#D81E1E', label: '$65 - $70' },
  { min: 70, max: 75, color: '#8C0000', label: '$70 - $75' },
  { min: 75, max: 80, color: '#3A0000', label: '$75 - $80' }
];
function colorFor(v) {
  for (const b of bins) { if (v > b.min - 1e-9 && v <= b.max + 1e-9) return b.color; }
  return v <= 50 ? bins[0].color : bins[bins.length - 1].color;
}
const neutralFill = '#2c2c2c';

const svg = d3.select('#map');
const projection = d3.geoNaturalEarth1().scale(155).translate([480, 250]);
const path = d3.geoPath(projection);
const infoPanel = document.getElementById('info-panel');
const infoName = document.getElementById('info-name');
const infoPrice = document.getElementById('info-price');
const infoFreight = document.getElementById('info-freight');
let selected = null;

function showInfo(event, name, entry) {
  infoName.textContent = name;
  infoPrice.textContent = '$' + entry.price.toFixed(2) + ' / barril';
  infoFreight.textContent = 'Flete estimado: $' + entry.freight.toFixed(2);
  const container = document.getElementById('map-container');
  const rect = container.getBoundingClientRect();
  let left = event.clientX - rect.left + 16;
  let top = event.clientY - rect.top + 10;
  if (left + 190 > rect.width) left = event.clientX - rect.left - 200;
  infoPanel.style.left = left + 'px';
  infoPanel.style.top = top + 'px';
  infoPanel.style.display = 'block';
}

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
  const countries = topojson.feature(world, world.objects.countries).features;
  svg.selectAll('path')
    .data(countries)
    .join('path')
    .attr('class', d => 'country' + (data[d.properties.name] ? ' has-data' : ''))
    .attr('d', path)
    .attr('fill', d => {
      const entry = data[d.properties.name];
      return entry ? colorFor(entry.price) : neutralFill;
    })
    .on('click', function(event, d) {
      const entry = data[d.properties.name];
      if (!entry) return;
      if (selected) selected.classList.remove('selected');
      this.classList.add('selected');
      selected = this;
      showInfo(event, d.properties.name, entry);
      event.stopPropagation();
    });
});

document.addEventListener('click', () => {
  infoPanel.style.display = 'none';
  if (selected) { selected.classList.remove('selected'); selected = null; }
});
document.getElementById('map-container').addEventListener('click', (e) => e.stopPropagation());

const legend = document.getElementById('legend');
bins.forEach(b => {
  const item = document.createElement('span');
  item.className = 'legend-item';
  const swatch = document.createElement('span');
  swatch.className = 'legend-swatch';
  swatch.style.background = b.color;
  item.appendChild(swatch);
  const text = document.createElement('span');
  text.textContent = b.label;
  item.appendChild(text);
  legend.appendChild(item);
});
</script>
</body>
</html>
